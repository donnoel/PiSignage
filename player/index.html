<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beam Player</title>
  </head>
  <body>
    <main class="player-shell" aria-label="Beam fullscreen player">
      <img id="asset" class="asset" alt="" />
      <video id="video-asset" class="asset hidden" autoplay muted playsinline preload="auto"></video>
      <video id="video-preload" class="asset hidden" muted playsinline preload="auto"></video>
      <div class="status-bar" aria-live="polite">
        <span id="playlist-name">Loading playlist</span>
        <span id="asset-status">Preparing playback</span>
      </div>
      <button id="fullscreen-button" class="fullscreen-button" type="button">
        Fullscreen
      </button>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
